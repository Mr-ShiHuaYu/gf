name: Format Code Check

on:
  push

jobs:
  format-code-check:
    strategy:
      matrix:
        go-version: [ 'stable' ]
    name: check-code-format-by-gci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Golang ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install gci
        run: go install github.com/daixiang0/gci@v0.14.0
      - name: Check code format by gci
        run: gci write --custom-order --skip-generated --skip-vendor -s standard -s blank -s default -s dot -s "prefix(github.com/gogf/gf/v2)" -s "prefix(github.com/gogf/gf/cmd)" -s "prefix(github.com/gogf/gf/contrib)" -s "prefix(github.com/gogf/gf/example)" ./
      - name: Report status
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Code format check failed. Please run gci locally and commit the changes."
            exit 1
          else
            echo "Code format check passed."
          fi